name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      released: ${{ steps.release.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Release
        id: release
        run: npx onreza-release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.platform }})
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - platform: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl-tools (Linux)
        if: matrix.platform == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip binary (Unix)
        if: matrix.platform != 'win32-x64'
        run: strip target/${{ matrix.target }}/release/kaneo
      - name: Package (Unix)
        if: matrix.platform != 'win32-x64'
        run: |
          mkdir -p dist
          tar -czf dist/kaneo-${{ matrix.platform }}.tar.gz -C target/${{ matrix.target }}/release kaneo
      - name: Package (Windows)
        if: matrix.platform == 'win32-x64'
        shell: bash
        run: |
          mkdir -p dist
          tar -czf dist/kaneo-${{ matrix.platform }}.tar.gz -C target/${{ matrix.target }}/release kaneo.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaneo-${{ matrix.platform }}
          path: dist/kaneo-${{ matrix.platform }}.tar.gz

  publish:
    name: Publish
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-raw
      - name: Flatten dist
        run: |
          mkdir -p dist
          find dist-raw -name '*.tar.gz' -exec mv {} dist/ \;
      - name: Publish binaries & npm
        run: npx onreza-release publish-binaries --tag ${{ needs.release.outputs.tag }} --npm-publish "npm publish --provenance"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt
      - name: Upload checksums
        run: gh release upload ${{ needs.release.outputs.tag }} dist/SHA256SUMS.txt --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
